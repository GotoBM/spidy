<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Contador Spiderman</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

  <!-- ===================== PANTALLA 1 ===================== -->
  <div id="pantalla1" class="pantalla activa">

    <!-- Imagen de fondo del traje -->
    <img id="fondo-traje" src="imagenes/fondo.png" alt="Traje Spider-Man" />

    <!-- Temporizador -->
    <div id="temporizador">
      <span id="horas">00</span>
      <span class="sep">:</span>
      <span id="minutos">00</span>
      <span class="sep">:</span>
      <span id="segundos">00</span>
    </div>

    <!-- Texto "Toca para continuar" (oculto hasta que termina el contador) -->
    <div id="toca-continuar" class="oculto">Toca para continuar</div>


    <!-- Overlay negro para transición final -->
    <div id="overlay-negro"></div>

  </div>
  <!-- ===================== FIN PANTALLA 1 ===================== -->


  <!-- ===================== PANTALLA 2 ===================== -->
  <div id="pantalla2" class="pantalla oculto">

    <!-- Flores en esquinas -->
    <div class="flor-esquina" id="flor-sup-izq" data-indice="0">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <g id="petalos-sup-izq"></g>
        <circle cx="60" cy="60" r="14" fill="#f5f5dc" stroke="#888" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="flor-esquina" id="flor-sup-der" data-indice="1">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <g id="petalos-sup-der"></g>
        <circle cx="60" cy="60" r="14" fill="#f5f5dc" stroke="#888" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="flor-esquina" id="flor-inf-der" data-indice="2">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <g id="petalos-inf-der"></g>
        <circle cx="60" cy="60" r="14" fill="#f5f5dc" stroke="#888" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="flor-esquina" id="flor-inf-izq" data-indice="3">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <g id="petalos-inf-izq"></g>
        <circle cx="60" cy="60" r="14" fill="#f5f5dc" stroke="#888" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Flor central -->
    <div id="flor-central" data-indice="4">
      <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
        <g id="petalos-central"></g>
        <circle cx="90" cy="90" r="22" fill="#f5f5dc" stroke="#888" stroke-width="2"/>
      </svg>
    </div>

    <!-- Modal de mensaje -->
    <div id="modal-mensaje" class="oculto">
      <div id="texto-mensaje"></div>
    </div>

  </div>
  <!-- ===================== FIN PANTALLA 2 ===================== -->

  <script src="js/app.js"></script>
</body>
</html>
